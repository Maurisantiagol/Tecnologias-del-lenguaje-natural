version: "3.9"

services:
  backend:
    build: ./Codigo
    container_name: tilins_backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: tilins_frontend
    ports:
      - "8080:80"
    volumes:
      - ./Codigo/frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
